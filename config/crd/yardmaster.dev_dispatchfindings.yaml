apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: dispatchfindings.yardmaster.dev
spec:
  group: yardmaster.dev
  names:
    kind: DispatchFinding
    listKind: DispatchFindingList
    plural: dispatchfindings
    shortNames:
      - df
    singular: dispatchfinding
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - severity
                - category
                - subject
                - summary
              properties:
                severity:
                  type: string
                  enum:
                    - info
                    - warning
                    - critical
                category:
                  type: string
                subject:
                  type: object
                  required:
                    - apiVersion
                    - kind
                    - name
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    namespace:
                      type: string
                    name:
                      type: string
                summary:
                  type: string
                detail:
                  type: string
                recommendations:
                  type: array
                  items:
                    type: string
            status:
              type: object
              properties:
                firstSeen:
                  type: string
                  format: date-time
                lastSeen:
                  type: string
                  format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Severity
          type: string
          jsonPath: .spec.severity
        - name: Category
          type: string
          jsonPath: .spec.category
        - name: Subject
          type: string
          jsonPath: .spec.subject.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
