apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: yardmaster
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - nodes
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - policy
    resources:
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - yardmaster.dev
    resources:
      - dispatchfindings
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - yardmaster.dev
    resources:
      - dispatchfindings/status
    verbs:
      - get
      - patch
      - update
