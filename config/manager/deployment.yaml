apiVersion: apps/v1
kind: Deployment
metadata:
  name: yardmaster
  namespace: yardmaster-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yardmaster
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yardmaster
    spec:
      serviceAccountName: yardmaster
      containers:
        - name: manager
          image: yardmaster:dev
          imagePullPolicy: IfNotPresent
          args:
            - --finding-namespace=yardmaster-system
