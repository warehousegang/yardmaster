apiVersion: apps/v1
kind: Deployment
metadata:
  name: yardmaster-dashboard
  namespace: yardmaster-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yardmaster-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yardmaster-dashboard
    spec:
      serviceAccountName: yardmaster
      containers:
        - name: dashboard
          image: yardmaster:dev
          imagePullPolicy: IfNotPresent
          command:
            - /yardmaster-dashboard
          args:
            - --addr=:8088
            - --finding-namespace=yardmaster-system
          ports:
            - name: http
              containerPort: 8088
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
