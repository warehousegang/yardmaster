apiVersion: v1
kind: Pod
metadata:
  name: yardmaster-unschedulable
  namespace: default
spec:
  nodeSelector:
    yardmaster.dev/missing-node-label: "true"
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.10
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
